# Docs: https://fly.io/docs/reference/configuration

app = 'thunderhub'
primary_region = 'iad'

[build]
dockerfile = 'Dockerfile'

[env]
DB_SQLITE_PATH = '/data/thunderhub.db'
DB_TYPE = 'sqlite'
LOG_LEVEL = 'info'
NODE_ENV = 'production'
PORT = '3000'

[[mounts]]
source = 'thunderhub_data'
destination = '/data'
initial_size = '1gb'

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = 'off'
auto_start_machines = true
min_machines_running = 1

[[http_service.checks]]
interval = '15s'
timeout = '5s'
grace_period = '30s'
method = 'GET'
path = '/api/config'

[[vm]]
size = 'shared-cpu-1x'
memory = '512mb'
